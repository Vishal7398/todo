<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sweetheart 💖</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cursor"></div>
    
    <!-- Music Controller -->
    <button class="music-toggle" id="music-btn" aria-label="Toggle Music">
        <span class="music-icon">🎵</span>
    </button>
    <audio id="bg-music" loop>
        <source src="https://archive.org/download/HappyBirthdayInstrumentalPianoViaInstrumentals.com.ng/Happy%20Birthday%20Instrumental%20Piano%20via%20instrumentals.com.ng.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1 class="main-title">Happy Birthday sweetheart 💗</h1>
        <div class="greeting"></div>
        <button class="cta-button" id="enter-btn">Click to Enter Our World 💕</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
